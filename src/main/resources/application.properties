spring.application.name=P2P-Shopping
server.port=8081
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=jdbc:postgresql://localhost:5433/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
jwt.secret=${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast32BytesLong!!}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/p2p_shopping}
telemetry.api.key=${TELEMETRY_API_KEY}
app.cors.allowed-origins=http://localhost:5173
