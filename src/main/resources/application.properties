spring.application.name=P2P-Shopping
server.port=8081
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:p2p_shopping}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
jwt.secret=${JWT_SECRET:defaultDevSecretKeyThatIsAtLeast32BytesLong!!}
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/p2p_shopping}
telemetry.api.key=${TELEMETRY_API_KEY}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.scheduling.enabled=true
routing.recalculation.cooldown=${ROUTING_RECALCULATION_COOLDOWN:PT1M}
routing.recalculation.guard.max-size=${ROUTING_RECALCULATION_GUARD_MAX_SIZE:10000}
data-decay.enabled=${DATA_DECAY_ENABLED:true}
data-decay.cron=${DATA_DECAY_CRON:0 0 3 * * ?}
data-decay.zone=${DATA_DECAY_ZONE:UTC}
data-decay.penalty=${DATA_DECAY_PENALTY:0.02}
data-decay.cutoff-days=${DATA_DECAY_CUTOFF_DAYS:14}
data-decay.min-confidence-floor=${DATA_DECAY_MIN_CONFIDENCE_FLOOR:0.15}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
