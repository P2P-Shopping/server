spring.application.name=P2P-Shopping

# H2 Database Configuration - Perfect pentru CI/Sonar
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Use in-memory simple cache for tests to avoid depending on external Redis
spring.cache.type=simple

# MongoDB - can be overridden via SPRING_DATA_MONGODB_URI env var for integration tests with real MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://mock-address:27017/test}

server.port=8081