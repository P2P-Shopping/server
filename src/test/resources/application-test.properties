spring.application.name=P2P-Shopping

# H2 Database Configuration - Perfect pentru CI/Sonar
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Use in-memory simple cache for tests to avoid depending on external Redis
spring.cache.type=simple

# MongoDB - can be overridden via SPRING_MONGODB_URI env var for integration tests with real MongoDB
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/test_db}

server.port=8081

telemetry.api.key=test-telemetry-key-for-tests
routing.recalculation.cooldown=PT1M
routing.recalculation.guard.max-size=10000
data-decay.enabled=true
data-decay.penalty=0.02
data-decay.cutoff-days=14
data-decay.min-confidence-floor=0.15
